name: Sync addon to standalone repository

on:
  push:
    branches:
      - main
    paths:
      - "addons/mariohamann/statamic-visual-editor/**"

jobs:
  sync:
    name: git subtree split & push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Split subtree
        run: |
          git subtree split \
            --prefix=addons/mariohamann/statamic-visual-editor \
            -b addon-split

      - name: Set up SSH deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ADDON_DEPLOY_KEY }}

      - name: Push to standalone repository
        run: |
          git push \
            git@github.com:mariohamann/statamic-visual-editor.git \
            addon-split:main \
            --force
