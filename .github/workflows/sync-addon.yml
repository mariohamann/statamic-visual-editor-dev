name: Sync addon to standalone repository

on:
  push:
    branches:
      - main
    paths:
      - "addons/mariohamann/statamic-visual-editor/**"
      - ".github/workflows/sync-addon.yml"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  sync:
    name: git subtree split & push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Split subtree
        run: |
          git subtree split \
            --prefix=addons/mariohamann/statamic-visual-editor \
            -b addon-split

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Install Composer dependencies (provides @statamic/cms npm package)
        working-directory: addons/mariohamann/statamic-visual-editor
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Build addon JS assets
        working-directory: addons/mariohamann/statamic-visual-editor
        run: npm ci && npm run build

      - name: Save built assets to temp
        run: cp -r addons/mariohamann/statamic-visual-editor/resources/dist/build /tmp/addon-dist-build

      - name: Commit built assets into split branch
        run: |
          git checkout addon-split
          mkdir -p resources/dist/build
          cp -r /tmp/addon-dist-build/. resources/dist/build/
          git add -f resources/dist/build
          git diff --cached --quiet || git commit -m "chore: include built assets"
          git checkout -

      - name: Set up SSH deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ADDON_DEPLOY_KEY }}

      - name: Push to standalone repository
        run: |
          git push \
            git@github.com:mariohamann/statamic-visual-editor.git \
            addon-split:main \
            --force

      - name: Push tag to standalone repository
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          SPLIT_SHA=$(git rev-parse addon-split)
          TAG=${GITHUB_REF#refs/tags/}
          git tag "$TAG" "$SPLIT_SHA" --force
          git push \
            git@github.com:mariohamann/statamic-visual-editor.git \
            "refs/tags/$TAG" \
            --force
